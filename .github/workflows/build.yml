# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: CI with Maven and Angular

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  java:
    name: Maven Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file crud-spring/pom.xml
    - name: Publish Maven Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Maven Test Report
        path: crud-spring/target/surefire-reports/TEST-*.xml
        reporter: java-junit
  angular:
    name: Angular Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: crud-angular/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: crud-angular
      - name: Run tests
        run: npm run test:ci
        working-directory: crud-angular
      - name: Build
        run: npm run build
        working-directory: crud-angular
  mutation-java:
    name: Maven Mutation Tests (PIT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Run PIT mutation tests
        run: mvn -B test-compile org.pitest:pitest-maven:mutationCoverage --file crud-spring/pom.xml
      - name: Upload PIT report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pit-mutation-report
          path: crud-spring/target/pit-reports
  mutation-angular:
    name: Angular Mutation Tests (Stryker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: crud-angular/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: crud-angular
      - name: Run Stryker mutation tests
        run: npm run test:mutation
        working-directory: crud-angular
      - name: Upload Stryker report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-mutation-report
          path: crud-angular/reports/mutation
