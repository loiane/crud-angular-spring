<mat-card appearance="outlined">
  <mat-toolbar>Available Courses</mat-toolbar>

  @if (coursesResource.value(); as coursePage) {
    <div class="mat-elevation-z8">
      <app-courses-list
        [courses]="coursePage.courses"
        (add)="onAdd()"
        (edit)="onEdit($event)"
        (remove)="onRemove($event)"
        (view)="onView($event)"></app-courses-list>
      <mat-paginator
        [pageSizeOptions]="[5, 10, 15]"
        showFirstLastButtons
        [length]="coursePage.totalElements"
        [pageIndex]="pageIndex()"
        [pageSize]="pageSize()"
        (page)="onPageChange($event)"
        aria-label="Select page of courses"></mat-paginator>
    </div>
  } @else if (coursesResource.isLoading()) {
    <div class="loading-spinner">
      <mat-spinner></mat-spinner>
    </div>
  }
</mat-card>
